<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --gold: #d4af37;
    --gold-dim: rgba(212,175,55,0.5);
    --gold-faint: rgba(212,175,55,0.15);
    --green: rgba(74,222,128,0.8);
    --green-bg: rgba(74,222,128,0.12);
    --red: rgba(248,113,113,0.8);
    --red-bg: rgba(248,113,113,0.12);
    --bg: #0a0a0f;
    --card: rgba(28,24,42,0.97);
    --text: #fff;
    --text-dim: rgba(255,255,255,0.55);
    --text-faint: rgba(255,255,255,0.25);
    --border: rgba(255,255,255,0.07);
  }
  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px 16px 40px;
  }
  .app { width: 100%; max-width: 400px; }

  /* Header */
  .header { text-align: center; margin-bottom: 24px; padding-top: 8px; }
  .header-sub { font-size: 10px; letter-spacing: 3px; color: var(--gold-dim); font-weight: 500; text-transform: uppercase; margin-bottom: 6px; }
  .header-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .header-title span { color: var(--gold); }

  /* Card */
  .card {
    background: var(--card);
    border-radius: 24px;
    border: 1px solid var(--gold-faint);
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .card.visible { opacity: 1; transform: translateY(0); }

  /* Poster */
  .poster {
    height: 190px;
    background: linear-gradient(135deg, #1a1528, #2d1f3d 50%, #1a2030);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .poster::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 40%, rgba(212,175,55,0.07) 0%, transparent 60%);
  }
  .poster-emoji { font-size: 75px; filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5)); position: relative; z-index: 1; }
  .rating-badge {
    position: absolute; top: 14px; right: 14px;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(10px);
    padding: 5px 12px; border-radius: 20px;
    border: 1px solid rgba(212,175,55,0.3);
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; font-weight: 500; color: var(--text);
  }
  .rating-badge span { color: var(--gold); }
  .year-badge {
    position: absolute; bottom: 14px; left: 14px;
    font-size: 11px; font-weight: 500; letter-spacing: 1px;
    color: var(--text-faint);
  }

  /* Body */
  .body { padding: 20px 20px 18px; }
  .movie-title { font-family: 'Playfair Display', serif; font-size: 21px; font-weight: 700; color: var(--text); line-height: 1.2; margin-bottom: 3px; }
  .movie-director { font-size: 11px; color: var(--gold-dim); margin-bottom: 10px; }
  .genres { margin-bottom: 12px; }
  .genre-tag {
    display: inline-block; padding: 2px 10px;
    border: 1px solid rgba(212,175,55,0.25); border-radius: 20px;
    font-size: 10px; font-weight: 500; color: var(--gold-dim);
    margin: 2px; letter-spacing: 0.5px;
  }
  .desc { font-size: 12.5px; line-height: 1.65; color: var(--text-dim); margin-bottom: 14px; }
  .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.18), transparent); margin-bottom: 14px; }

  /* AI Note */
  .ai-note { min-height: 50px; margin-bottom: 18px; }
  .ai-note p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 12.5px; line-height: 1.7; color: rgba(212,175,55,0.75); }
  .shimmer-line { height: 12px; border-radius: 4px; margin-bottom: 7px;
    background: linear-gradient(90deg, #2a2a3a 25%, #3a3a4f 50%, #2a2a3a 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

  /* Votes */
  .actions { display: flex; align-items: center; justify-content: space-between; }
  .vote-btns { display: flex; gap: 10px; }
  .vote-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer; padding: 0;
  }
  .vote-circle {
    width: 50px; height: 50px; border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    transition: all 0.2s ease;
  }
  .vote-circle.liked { background: var(--green-bg); border-color: var(--green); box-shadow: 0 0 18px rgba(74,222,128,0.18); }
  .vote-circle.disliked { background: var(--red-bg); border-color: var(--red); box-shadow: 0 0 18px rgba(248,113,113,0.18); }
  .vote-label { font-size: 9px; font-weight: 500; color: var(--text-faint); transition: color 0.2s; }
  .vote-label.liked { color: var(--green); }
  .vote-label.disliked { color: var(--red); }
  .bounce { animation: bounce 0.5s ease; }
  @keyframes bounce { 0%{transform:scale(1)} 30%{transform:scale(1.3)} 60%{transform:scale(0.9)} 100%{transform:scale(1)} }

  .next-btn {
    cursor: pointer; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04); color: var(--text-dim);
    padding: 10px 20px; border-radius: 40px;
    font-family: 'DM Sans', sans-serif; font-size: 12px; letter-spacing: 0.5px;
    transition: all 0.2s ease;
  }
  .next-btn:hover { background: rgba(255,255,255,0.09); color: var(--text); border-color: rgba(255,255,255,0.25); }

  /* Stats */
  .stats { display: flex; justify-content: center; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .stat-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 12px; border-radius: 20px;
    font-size: 10px; font-weight: 500;
  }
  .stat-badge.green { background: var(--green-bg); border: 1px solid rgba(74,222,128,0.18); color: var(--green); }
  .stat-badge.red { background: var(--red-bg); border: 1px solid rgba(248,113,113,0.18); color: var(--red); }
  .stat-badge.gray { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text-faint); }

  .footer { text-align: center; margin-top: 14px; font-size: 9.5px; color: var(--text-faint); letter-spacing: 0.5px; }

  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab {
    flex: 1; padding: 9px; border-radius: 12px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.03); color: var(--text-faint);
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; text-align: center; letter-spacing: 0.3px;
  }
  .tab.active { background: var(--gold-faint); border-color: var(--gold-dim); color: var(--gold); }

  /* History panel */
  .history-panel { display: none; }
  .history-panel.show { display: block; }
  .history-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: 14px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .history-emoji { font-size: 24px; }
  .history-info { flex: 1; }
  .history-title { font-size: 13px; font-weight: 500; color: var(--text); font-family: 'Playfair Display', serif; }
  .history-year { font-size: 10px; color: var(--text-faint); }
  .history-vote { font-size: 18px; }
  .reset-btn {
    width: 100%; padding: 12px; border-radius: 14px;
    background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2);
    color: var(--red); font-family: 'DM Sans', sans-serif; font-size: 12px;
    cursor: pointer; margin-top: 12px; transition: all 0.2s;
  }
  .reset-btn:hover { background: rgba(248,113,113,0.15); }
</style>
</head>

  </div>

  </div>

  <!-- Discover Tab -->
  <div id="discover-tab">

          <div class="shimmer-line" style="width:70%"></div>
        </div>
        <div class="actions">
          <div class="vote-btns">
            <button class="vote-btn" onclick="vote('like')" id="like-btn">
              <div class="vote-circle" id="like-circle">👍</div>
              <span class="vote-label" id="like-label">Îmi place</span>
            </button>
            <button class="vote-btn" onclick="vote('dislike')" id="dislike-btn">
              <div class="vote-circle" id="dislike-circle">👎</div>
              <span class="vote-label" id="dislike-label">Nu-mi place</span>
            </button>
          </div>
          <button class="next-btn" onclick="nextMovie()">Următor →</button>
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="stat-badge green">👍 <span id="liked-count">0</span> apreciate</div>
      <div class="stat-badge red">👎 <span id="disliked-count">0</span> respinse</div>
      <div class="stat-badge gray">🎬 <span id="seen-count">0</span> văzute</div>
    </div>
    <div class="footer">Recomandări personalizate cu AI ✦ Preferințele se salvează local</div>
  </div>

  <!-- History Tab -->
  <div id="history-tab" class="history-panel">
    <div id="history-list"></div>
    <button class="reset-btn" onclick="resetAll()">🗑️ Resetează toate preferințele</button>
  </div>
</div>

const STORAGE_KEY = "cinemaAI_v2";

function loadPrefs() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {liked:[],disliked:[],seen:[]}; }
  catch { return {liked:[],disliked:[],seen:[]}; }
}
function savePrefs(p) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch {}
}

let prefs = loadPrefs();
let currentMovie = null;
let currentVote = null;
let aiLoading = false;

function getRecommendation() {
  const unseen = MOVIES.filter(m => !prefs.seen.includes(m.id));
  const pool = unseen.length > 0 ? unseen : MOVIES;

  const likedMovies = MOVIES.filter(m => prefs.liked.includes(m.id));
  const dislikedMovies = MOVIES.filter(m => prefs.disliked.includes(m.id));

  if (likedMovies.length === 0) {
    const idx = Math.floor(Date.now() / 86400000) % pool.length;
    return pool[idx];
  }

  const likedTags = likedMovies.flatMap(m => m.tags);
  const likedGenres = likedMovies.flatMap(m => m.genre);
  const dislikedTags = dislikedMovies.flatMap(m => m.tags);
  const dislikedGenres = dislikedMovies.flatMap(m => m.genre);

  const scored = pool.map(m => {
    let score = m.rating;
    m.tags.forEach(t => { if (likedTags.includes(t)) score += 2.5; });
    m.genre.forEach(g => { if (likedGenres.includes(g)) score += 2; });
    m.tags.forEach(t => { if (dislikedTags.includes(t)) score -= 4; });
    m.genre.forEach(g => { if (dislikedGenres.includes(g)) score -= 2; });
    // add slight randomness
    score += (Math.random() - 0.5) * 1.5;
    return {...m, score};
  });

  scored.sort((a, b) => b.score - a.score);
  return scored[0];
function fetchAiNote(movie) {
  const noteEl = document.getElementById('ai-note');

  const likedGenres = MOVIES
    .filter(m => prefs.liked.includes(m.id))
    .flatMap(m => m.genre);

  let message = "";

  if (likedGenres.includes(movie.genre[0])) {
    message = `Ți-am ales acest film pentru că se potrivește cu preferințele tale pentru ${movie.genre[0]}. Are șanse mari să-ți placă.`;
  } else if (prefs.liked.length > 5) {
    message = `Bazat pe voturile tale, acest film îți extinde puțin gusturile fără să iasă prea mult din zona ta preferată.`;
  } else {
    message = `O recomandare bună pentru azi — apreciat de critici și excelent pentru explorarea gusturilor tale cinematografice.`;
  }

  noteEl.innerHTML = `<p>"${message}"</p>`;
}

function renderMovie(movie) {
  currentMovie = movie;
  currentVote = prefs.liked.includes(movie.id) ? 'like' : prefs.disliked.includes(movie.id) ? 'dislike' : null;

  const card = document.getElementById('card');
  card.classList.remove('visible');

  setTimeout(() => {
    document.getElementById('poster').textContent = movie.e;
    document.getElementById('rating').textContent = movie.rating;
    document.getElementById('year').textContent = movie.year;
    document.getElementById('title').textContent = movie.title;
    document.getElementById('director').textContent = `regia ${movie.dir}`;
    document.getElementById('desc').textContent = movie.desc;
    document.getElementById('genres').innerHTML = movie.genre.map(g => `<span class="genre-tag">${g}</span>`).join('');
    updateVoteUI();
    updateStats();
    card.classList.add('visible');
    fetchAiNote(movie);
  }, 300);
}

function updateVoteUI() {
  const lc = document.getElementById('like-circle');
  const dc = document.getElementById('dislike-circle');
  const ll = document.getElementById('like-label');
  const dl = document.getElementById('dislike-label');
  lc.className = 'vote-circle' + (currentVote === 'like' ? ' liked' : '');
  dc.className = 'vote-circle' + (currentVote === 'dislike' ? ' disliked' : '');
  ll.className = 'vote-label' + (currentVote === 'like' ? ' liked' : '');
  dl.className = 'vote-label' + (currentVote === 'dislike' ? ' disliked' : '');
}

function updateStats() {
  document.getElementById('liked-count').textContent = prefs.liked.length;
  document.getElementById('disliked-count').textContent = prefs.disliked.length;
  document.getElementById('seen-count').textContent = prefs.seen.length;
}

function vote(type) {
  if (!currentMovie) return;
  const id = currentMovie.id;

  prefs.liked = prefs.liked.filter(x => x !== id);
  prefs.disliked = prefs.disliked.filter(x => x !== id);

  if (currentVote === type) {
    currentVote = null;
  } else {
    if (type === 'like') prefs.liked.push(id);
    else prefs.disliked.push(id);
    currentVote = type;

    const circle = document.getElementById(type === 'like' ? 'like-circle' : 'dislike-circle');
    circle.classList.add('bounce');
    setTimeout(() => circle.classList.remove('bounce'), 600);
  }

  savePrefs(prefs);
  updateVoteUI();
  updateStats();
}

function nextMovie() {
  if (currentMovie && !prefs.seen.includes(currentMovie.id)) {
    prefs.seen.push(currentMovie.id);
    savePrefs(prefs);
  }
  const next = getRecommendation();
  renderMovie(next);
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'discover') || (i === 1 && tab === 'history'));
  });
  document.getElementById('discover-tab').style.display = tab === 'discover' ? 'block' : 'none';
  document.getElementById('history-tab').style.display = tab === 'history' ? 'block' : 'none';

  if (tab === 'history') renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const allVoted = [...prefs.liked.map(id => ({id, v:'like'})), ...prefs.disliked.map(id => ({id, v:'dislike'}))];

  if (allVoted.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-faint);font-size:13px;">Niciun film votat încă.<br>Apasă 👍 sau 👎 pe filme!</div>`;
    return;
  }

  list.innerHTML = allVoted.map(({id, v}) => {
    const m = MOVIES.find(x => x.id === id);
    if (!m) return '';
    return `<div class="history-item">
      <div class="history-emoji">${m.e}</div>
      <div class="history-info">
        <div class="history-title">${m.title}</div>
        <div class="history-year">${m.year} · ${m.genre[0]}</div>
      </div>
      <div class="history-vote">${v === 'like' ? '👍' : '👎'}</div>
    </div>`;
  }).join('');
}

function resetAll() {
  if (confirm('Ești sigur că vrei să ștergi toate preferințele?')) {
    prefs = {liked:[], disliked:[], seen:[]};
    savePrefs(prefs);
    updateStats();
    showTab('discover');
    renderMovie(getRecommendation());
  }
}

// Init
window.addEventListener('load', () => {
  const first = getRecommendation();
  renderMovie(first);
});
